<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lash Bot — Запись к мастеру</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #e8d0bc 0%, #d4b99e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(0, 0, 0, 0.1);
        border-left-color: #5a9e6e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #loading.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- SVG Liquid Glass Filter -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.005 0.005" numOctaves="3" seed="42" result="noise"/>
          <feGaussianBlur in="noise" stdDeviation="1.5" result="blurredNoise"/>
          <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="8" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
          <feSpecularLighting in="blurredNoise" surfaceScale="1.5" specularConstant="0.5" specularExponent="25" lighting-color="#fff5f0" result="specular">
            <feDistantLight azimuth="-45" elevation="60"/>
          </feSpecularLighting>
          <feComposite in="specular" in2="displaced" operator="in" result="specularComposited"/>
          <feBlend in="displaced" in2="specularComposited" mode="screen" result="liquidGlass"/>
        </filter>
      </defs>
    </svg>

    <div id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 16px; color: #2c1f14; font-size: 16px;">Загрузка...</p>
    </div>
    <div id="root"></div>
    <script>
      // Скрываем loading когда React загрузился
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) loading.classList.add('hidden');
        }, 100);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
